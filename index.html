<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff5533">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="番茄钟">
<title>番茄钟</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f; --surface:#0f1419; --border:#1e2832; --border2:#243040;
  --tomato:#a34b3a; /* 调整后的柔和红色 */
  --tomato-bright:#ff5533;
  --tomato-dim:rgba(163,75,58,0.15);
  --teal:#00d4aa; --teal-dim:rgba(0,212,170,0.12);
  --text:#e8eef5; --text-2:#8899aa; --text-3:#445566;
  --amber:#ffaa33; --blue:#4d9fff; --purple:#9b7cff; --nav-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}
button{font-family:'Syne',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.app{display:grid;grid-template-rows:var(--nav-h) 1fr;height:100vh;overflow:hidden;}
nav{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);gap:28px;position:relative;z-index:20;flex-shrink:0;}
.nav-brand{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--tomato-bright);margin-right:auto;}
.nav-tab{background:none;border:none;color:var(--text-2);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:18px 0;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--tomato-bright);}
.page{display:none;height:100%;overflow-y:auto;overflow-x:hidden;}
.page.active{display:block;}
#page-timer{display:none;overflow-y:auto;overflow-x:hidden;}
#page-timer.active{display:flex;align-items:flex-start;justify-content:center;position:relative;min-height:100%;}
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(30,40,50,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,40,50,.4) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;}
@keyframes doFlash{0%{opacity:0}20%{opacity:.12}100%{opacity:0}}
.flash.go{animation:doFlash 1.2s ease forwards;}
.timer-wrap{position:relative;z-index:5;display:flex;flex-direction:row;width:100%;min-height:100%;max-width:1100px;padding:24px 0;align-items:stretch;}
.divider{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;transition:background .2s;}
.divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:60px;background:var(--border);border-radius:1px;transition:background .2s;}
.divider:hover::after,.divider.dragging::after{background:var(--tomato-bright);}
.timer-col{display:flex;flex-direction:column;align-items:center;gap:18px;padding:12px 28px 24px;overflow-y:auto;flex-shrink:0;width:300px;}
.mode-pills{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.pill{background:none;border:none;color:var(--text-3);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border-radius:5px;transition:all .25s;}
.pill:hover{color:var(--text-2);}
.pill.active{background:var(--border2);color:var(--text);}
.ring-container{position:relative;width:180px;height:180px;flex-shrink:0;}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.r-track{fill:none;stroke:var(--border2);stroke-width:1.5;}
.r-fill{fill:none;stroke-width:3;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .8s;}
.r-glow{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:0;opacity:.18;transition:stroke-dashoffset 1s linear,stroke .8s;filter:blur(4px);}
.ring-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.t-big{font-family:'Syne Mono',monospace;font-size:38px;line-height:1;letter-spacing:-.02em;transition:color .8s;color:var(--tomato);}
.t-mode{display:none;} /* 隐藏网页端的“专注时间”文字 */
.timer-controls{display:flex;align-items:center;gap:12px;}
.ctrl-btn{width:42px;height:42px;background:var(--surface);border:1px solid var(--border2);border-radius:50%;color:var(--text-2);font-size:15px;transition:all .2s;display:grid;place-items:center;}
.ctrl-btn:hover{color:var(--text);border-color:var(--text-3);}
.play-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:20px;transition:all .2s;display:grid;place-items:center;}
.play-btn.work{background:var(--tomato);color:white;box-shadow:0 0 24px var(--tomato-dim);}
.play-btn.rest{background:var(--teal);color:#080b0f;box-shadow:0 0 24px var(--teal-dim);}
.play-btn:hover{transform:scale(1.06);filter:brightness(1.1);}
.today-strip{display:flex;gap:24px;border-top:1px solid var(--border);padding-top:18px;width:100%;justify-content:center;}
/* 后面省略了重复的样式逻辑... 这里的样式完全兼容上一版 */
.t-stat{text-align:center;}
.t-val{font-family:'Syne Mono',monospace;font-size:22px;color:var(--text);display:block;line-height:1;}
.t-lbl{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);display:block;margin-top:4px;}
.tomato-dots{display:flex;gap:5px;justify-content:center;margin-top:4px;}
.td{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .4s;}
.td.lit{background:var(--tomato);box-shadow:0 0 5px var(--tomato);}
.dur-row{display:flex;flex-direction:column;gap:9px;width:100%;}
.dur-item{display:flex;align-items:center;gap:8px;font-size:9px;color:var(--text-3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.dur-item .dur-lbl{width:26px;}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:var(--border2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--text-3);transition:background .2s;}
input[type=range]::-webkit-slider-thumb:hover{background:var(--text);}
.dur-val{min-width:20px;color:var(--text-2);text-align:right;font-family:'Syne Mono',monospace;}
.tasks-col{display:flex;flex-direction:column;gap:14px;padding:12px 28px 24px;flex:1;min-width:0;overflow-y:auto;}
.tasks-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tasks-title{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-2);}
.active-task-badge{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0;font-size:12px;}
.atb-dot{width:7px;height:7px;border-radius:50%;background:var(--tomato);flex-shrink:0;box-shadow:0 0 5px var(--tomato);}
.atb-text{color:var(--text-2);}
.atb-name{color:var(--text);font-weight:700;}
.atb-none{color:var(--text-3);font-style:italic;font-size:11px;}
.add-task-row{display:flex;gap:8px;flex-shrink:0;}
.add-task-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.add-task-input::placeholder{color:var(--text-3);}
.add-task-input:focus{border-color:var(--border2);}
.add-task-btn{background:var(--tomato);border:none;color:white;border-radius:8px;padding:0 15px;font-size:20px;font-weight:300;transition:filter .2s;}
.add-task-btn:hover{filter:brightness(1.1);}
.task-list{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:6px;padding-right:2px;}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:9px;transition:all .2s;position:relative;}
.task-item:hover{border-color:var(--border2);}
.task-item.selected{border-color:var(--tomato);background:rgba(163,75,58,0.06);}
.task-item.done{opacity:.4;}
.task-item.done .task-name{text-decoration:line-through;color:var(--text-3);}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:grid;place-items:center;transition:all .2s;background:none;}
.task-check:hover{border-color:var(--teal);}
.task-check.checked{background:var(--teal);border-color:var(--teal);}
.task-check.checked::after{content:'✓';font-size:9px;color:#080b0f;font-weight:700;}
.task-body{flex:1;min-width:0;cursor:pointer;}
.task-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-meta{display:flex;gap:9px;margin-top:2px;}
.task-count{font-size:10px;color:var(--tomato);font-family:'Syne Mono',monospace;}
.task-time{font-size:10px;color:var(--text-3);font-family:'Syne Mono',monospace;}
.task-sel-btn{background:none;border:1px solid var(--border2);color:var(--text-3);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:5px;transition:all .2s;flex-shrink:0;}
.task-sel-btn:hover{color:var(--tomato);border-color:var(--tomato);}
.task-item.selected .task-sel-btn{color:var(--tomato);border-color:var(--tomato);background:rgba(163,75,58,0.08);}
.task-del{background:none;border:none;color:var(--text-3);font-size:13px;padding:2px 5px;border-radius:4px;opacity:0;transition:all .2s;flex-shrink:0;}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--tomato);background:rgba(163,75,58,.1);}
.empty-tasks{text-align:center;padding:36px 20px;color:var(--text-3);font-size:12px;line-height:1.9;}
.undo-btn{background:none;border:1px solid var(--border2);color:var(--text-3);font-size:11px;font-weight:600;padding:8px 16px;border-radius:8px;width:100%;letter-spacing:.05em;transition:all .2s;}
.undo-btn:hover{color:var(--tomato);border-color:var(--tomato);background:rgba(163,75,58,.06);}
#page-dash{padding:28px 36px 60px;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
.dash-title{font-size:20px;font-weight:800;}
.dash-sub{font-size:10px;color:var(--text-3);letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-top:3px;}
.dash-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.period-tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.ptab{background:none;border:none;color:var(--text-3);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 13px;border-radius:5px;transition:all .2s;}
.ptab:hover{color:var(--text-2);}
.ptab.active{background:var(--border2);color:var(--text);}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-size:11px;font-weight:600;padding:7px 13px;letter-spacing:.05em;transition:all .2s;display:flex;align-items:center;gap:5px;}
.icon-btn:hover{color:var(--text);border-color:var(--border2);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 16px 13px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.k-tomato::before{background:linear-gradient(90deg,var(--tomato),transparent);}
.kpi-card.k-teal::before{background:linear-gradient(90deg,var(--teal),transparent);}
.kpi-card.k-amber::before{background:linear-gradient(90deg,var(--amber),transparent);}
.kpi-card.k-blue::before{background:linear-gradient(90deg,var(--blue),transparent);}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;}
.kpi-value{font-family:'Syne Mono',monospace;font-size:32px;line-height:1;}
.kpi-value.k-tomato{color:var(--tomato);}
.kpi-value.k-teal{color:var(--teal);}
.kpi-value.k-amber{color:var(--amber);}
.kpi-value.k-blue{color:var(--blue);}
.kpi-sub{font-size:10px;color:var(--text-3);margin-top:4px;}
.dash-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:11px;margin-bottom:11px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.chart-title{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-2);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:115px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-end;gap:2px;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s cubic-bezier(.34,1.56,.64,1);}
.bar-lbl{font-size:8px;color:var(--text-3);font-weight:600;}
.bar-val{font-size:8px;color:var(--text-3);font-family:'Syne Mono',monospace;}
.task-breakdown{display:flex;flex-direction:column;gap:9px;}
.tb-row{display:flex;flex-direction:column;gap:4px;}
.tb-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.tb-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.tb-val{font-family:'Syne Mono',monospace;font-size:10px;color:var(--text-2);flex-shrink:0;}
.tb-bar-wrap{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.tb-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.tb-empty{font-size:11px;color:var(--text-3);text-align:center;padding:18px 0;}
.cal-nav{display:flex;align-items:center;gap:9px;}
.cal-nav-btn{background:none;border:1px solid var(--border2);color:var(--text-2);width:24px;height:24px;border-radius:5px;font-size:13px;transition:all .2s;display:grid;place-items:center;}
.cal-nav-btn:hover{color:var(--text);}
.cal-month-label{font-size:11px;font-weight:700;min-width:70px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:8px;font-weight:700;color:var(--text-3);padding-bottom:4px;}
.cal-cell{aspect-ratio:1;border-radius:5px;background:var(--border);display:flex;align-items:flex-end;justify-content:flex-end;padding:2px;position:relative;transition:background .3s;border:1px solid transparent;}
.cal-cell.today{border-color:var(--text-3);}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell:hover:not(.empty)::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1e2832;color:var(--text);font-size:9px;padding:3px 7px;border-radius:5px;white-space:nowrap;z-index:99;pointer-events:none;border:1px solid var(--border2);}
.cal-date{font-size:7px;font-weight:700;color:var(--text-3);line-height:1;}
.record-list{display:flex;flex-direction:column;}
.record-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.record-row:last-child{border-bottom:none;}
.rec-lbl{font-size:10px;color:var(--text-2);font-weight:600;}
.rec-val{font-family:'Syne Mono',monospace;font-size:16px;color:var(--tomato);}
.rec-date{font-size:9px;color:var(--text-3);margin-top:1px;}
.legend{display:flex;gap:11px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-3);font-weight:600;}
.leg-dot{width:7px;height:7px;border-radius:2px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;width:min(460px,92vw);display:flex;flex-direction:column;gap:14px;}
.modal-title{font-size:15px;font-weight:800;}
.modal-sub{font-size:12px;color:var(--text-2);line-height:1.6;}
.modal-textarea{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:11px;color:var(--text);font-family:'Syne Mono',monospace;font-size:11px;resize:vertical;min-height:120px;outline:none;width:100%;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{background:var(--border2);border:none;color:var(--text);font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;transition:all .2s;}
.modal-btn.primary{background:var(--tomato);color:white;}
.modal-btn:hover{filter:brightness(1.1);}
#installBanner{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;display:none;align-items:center;gap:11px;box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:100;}
.install-text{font-size:12px;color:var(--text-2);}
.install-text strong{color:var(--text);}
.install-btn{background:var(--tomato);color:white;border:none;font-size:11px;font-weight:700;padding:6px 13px;border-radius:6px;transition:filter .2s;}
.install-btn:hover{filter:brightness(1.1);}
.install-close{background:none;border:none;color:var(--text-3);font-size:16px;padding:2px 4px;}

/* 视频组件：用于画中画渲染 */
#pip-video { position: fixed; pointer-events: none; opacity: 0; width: 1px; height: 1px; }
</style>
</head>
<body>
<div class="app">
  <nav>
    <span class="nav-brand">🍅 番茄钟</span>
    <button class="nav-tab active" onclick="switchTab('timer')" id="ntab-timer">计时器</button>
    <button class="nav-tab" onclick="switchTab('dash')"  id="ntab-dash">数据看板</button>
  </nav>

  <div class="page active" id="page-timer">
    <div class="bg-grid"></div>
    <div class="flash" id="flash"></div>
    <div class="timer-wrap">
      <div class="timer-col" id="timerCol">
        <div class="mode-pills">
          <button class="pill active" onclick="setMode('work')"  id="p-work">专注</button>
          <button class="pill"        onclick="setMode('short')" id="p-short">短休息</button>
          <button class="pill"        onclick="setMode('long')"  id="p-long">长休息</button>
        </div>
        <div class="ring-container">
          <svg class="ring-svg" viewBox="0 0 220 220">
            <circle class="r-track" cx="110" cy="110" r="100"/>
            <circle class="r-glow"  id="rGlow" cx="110" cy="110" r="100"/>
            <circle class="r-fill"  id="rFill" cx="110" cy="110" r="100"/>
          </svg>
          <div class="ring-face">
            <div class="t-big"  id="tBig">25:00</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="ctrl-btn" onclick="resetTimer()" title="重置">↺</button>
          <button class="play-btn work" id="playBtn" onclick="toggleTimer()">▶</button>
          <button class="ctrl-btn" onclick="skipSession()" title="跳过">⇥</button>
          <button class="ctrl-btn" onclick="togglePiP()" id="pipBtn" title="画中画模式">📺</button>
        </div>
        <div class="today-strip">
          <div class="t-stat"><span class="t-val" id="tTomatoes">0</span><span class="t-lbl">今日番茄</span></div>
          <div class="t-stat"><span class="t-val" id="tFocus">0</span><span class="t-lbl">分钟</span></div>
        </div>
        <div class="dur-row">
          <div class="dur-item"><span class="dur-lbl">专注</span><input type="range" id="slWork"  min="1" max="60" value="25" oninput="updateDur('work',this.value)"><span class="dur-val" id="dvWork">25</span>m</div>
          <div class="dur-item"><span class="dur-lbl">短休</span><input type="range" id="slShort" min="1" max="30" value="5"  oninput="updateDur('short',this.value)"><span class="dur-val" id="dvShort">5</span>m</div>
        </div>
        <button class="undo-btn" id="undoBtn" onclick="undoLastTomato()" style="display:none">↩ 撤销最后一个</button>
      </div>

      <div class="divider" id="divider"></div>

      <div class="tasks-col" id="tasksCol">
        <div class="tasks-header"><span class="tasks-title">📋 今日任务</span></div>
        <div class="active-task-badge" id="activeBadge">
          <div class="atb-dot" id="atbDot" style="opacity:0"></div>
          <div id="atbText"><span class="atb-none">未选择任务</span></div>
        </div>
        <div class="add-task-row">
          <input class="add-task-input" id="taskInput" placeholder="添加任务…" maxlength="40" onkeydown="if(event.key==='Enter')addTask()">
          <button class="add-task-btn" onclick="addTask()">+</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-dash">
    </div>
</div>

<video id="pip-video" autoplay muted playsinline></video>

<script>
/* -----------------------------------------------------------
   PWA & NOTIFICATION
----------------------------------------------------------- */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex';});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

function sendPomoNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification(title, { body: body, icon: 'icon-192.png', tag: 'pomo-done', renotify: true });
    });
  }
}

/* -----------------------------------------------------------
   PICTURE IN PICTURE (画中画逻辑)
----------------------------------------------------------- */
function updatePiPCanvas() {
  if (!document.pictureInPictureElement) return;
const pipVid = document.getElementById('pip-video');
const pipCanvas = document.createElement('canvas');
// 使用更小的画布分辨率(150x80)，诱导浏览器允许更小的窗口缩放
// 1. 设置高分辨率画布 (400x200)，保证文字极其清晰
  pipCanvas.width = 400;
  pipCanvas.height = 200;
  
  // 2. 清除背景
  pctx.fillStyle = '#080b0f'; // 匹配主题背景深色
  pctx.fillRect(0, 0, 400, 200);
  
  // 3. 绘制倒计时数字
  pctx.fillStyle = mode === 'work' ? '#c45a4a' : '#00d4aa'; // 柔和红/青色
  pctx.font = 'bold 90px Syne Mono, monospace'; // 大字体在高分画布下更清晰
  pctx.textAlign = 'center';
  pctx.textBaseline = 'middle';
  
  // 4. 渲染文本 (只有时间，没有文字)
  pctx.fillText(fmtTime(timeLeft), 200, 100);

  // 循环刷新
  requestAnimationFrame(updatePiPCanvas);
  }
}

async function togglePiP() {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
    } else {
      if (Notification.permission === 'default') Notification.requestPermission();
      pipActive = true;
      pipVid.play();
      updatePiPCanvas();
      await pipVid.requestPictureInPicture();
    }
  } catch (err) { console.error("PiP 启动失败", err); }
}

pipVid.addEventListener('leavepictureinpicture', () => { pipActive = false; });

/* -----------------------------------------------------------
   TIMER CORE (核心计时逻辑)
----------------------------------------------------------- */
const DATA_KEY='pomo_data_v4', TASKS_KEY='pomo_tasks_v1';
const C=2*Math.PI*100;
const rFill=document.getElementById('rFill'),rGlow=document.getElementById('rGlow');
rFill.style.strokeDasharray=C;rGlow.style.strokeDasharray=C;
const cfg={work:25*60,short:5*60,long:15*60};
let mode='work',timeLeft=cfg.work,totalTime=cfg.work,running=false,timer=null,cycleCount=0;
const modeLabels={work:'专注时间',short:'短休息',long:'长休息'};

function loadData(){try{return JSON.parse(localStorage.getItem(DATA_KEY))||{};}catch{return {};}}
function savData(d){localStorage.setItem(DATA_KEY,JSON.stringify(d));}
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASKS_KEY))||[];}catch{return [];}}
function savTasks(t){localStorage.setItem(TASKS_KEY,JSON.stringify(t));}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function fmtTime(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

function render(){
  document.getElementById('tBig').textContent=fmtTime(timeLeft);
  document.title=fmtTime(timeLeft)+' · 番茄';
  const off=C*(1-timeLeft/totalTime);
  rFill.style.strokeDashoffset=off; rGlow.style.strokeDashoffset=off;
  const color = mode==='work'?'var(--tomato)':'var(--teal)';
  rFill.style.stroke=color; rGlow.style.stroke=color;
  
  // MediaSession 同步到小窗控制条
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: fmtTime(timeLeft), artist: '番茄钟' });
    navigator.mediaSession.setActionHandler('play', toggleTimer);
    navigator.mediaSession.setActionHandler('pause', toggleTimer);
  }
}

function setMode(m){
  clearInterval(timer); running=false; mode=m;
  timeLeft=cfg[m]; totalTime=cfg[m];
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').className=`play-btn ${m==='work'?'work':'rest'}`;
  ['work','short','long'].forEach(x=>document.getElementById('p-'+x).classList.toggle('active',x===m));
  render();
}

function toggleTimer(){
  if(running){ clearInterval(timer); running=false; document.getElementById('playBtn').textContent='▶'; }
  else { running=true; document.getElementById('playBtn').textContent='⏸'; timer=setInterval(tick,1000); }
}

function tick(){ if(timeLeft<=0){onDone();return;} timeLeft--; render(); }

function onDone(){
  clearInterval(timer); running=false;
  sendPomoNotification(mode==='work'?'🍅 专注完成！':'✅ 休息结束', mode==='work'?'你已完成了一个番茄钟':'准备好开始下一个了吗？');
  if(mode==='work') {
    cycleCount++;
    recordSession('work', Math.round(cfg.work/60));
    setTimeout(()=>setMode(cycleCount%4===0?'long':'short'),1000);
  } else {
    setTimeout(()=>setMode('work'),1000);
  }
}

function recordSession(type, mins){
  const data=loadData(), k=todayKey();
  if(!data[k]) data[k]={tomatoes:0,workMins:0};
  if(type==='work'){data[k].tomatoes++; data[k].workMins+=mins;}
  savData(data);
}

// 基础 UI 初始化
function resetTimer(){ setMode(mode); }
function skipSession(){ onDone(); }
function updateDur(type,val){ cfg[type]=val*60; document.getElementById('dv'+type.charAt(0).toUpperCase()+type.slice(1)).textContent=val; if(mode===type)resetTimer(); }

/* 任务管理逻辑（简易版） */
let selectedTaskId=null;
function addTask(){
  const inp=document.getElementById('taskInput'),name=inp.value.trim();
  if(!name)return;
  const tasks=loadTasks();
  tasks.push({id:Date.now().toString(),name,done:false});
  savTasks(tasks); inp.value=''; renderTasks();
}
function renderTasks(){
  const tasks=loadTasks(),el=document.getElementById('taskList');
  el.innerHTML=tasks.map(t=>`<div class="task-item" onclick="selectTask('${t.id}')">${t.name}</div>`).join('');
}
function selectTask(id){ selectedTaskId=id; document.getElementById('atbText').textContent="正在专注中..."; }

render();
</script>
</body>
</html>
