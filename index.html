<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff5533">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="番茄钟">
<title>番茄钟</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f; --surface:#0f1419; --border:#1e2832; --border2:#243040;
  --tomato:#ff5533; --tomato-dim:rgba(255,85,51,0.15);
  --teal:#00d4aa; --teal-dim:rgba(0,212,170,0.12);
  --text:#e8eef5; --text-2:#8899aa; --text-3:#445566;
  --amber:#ffaa33; --blue:#4d9fff; --purple:#9b7cff; --nav-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}
button{font-family:'Syne',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.app{display:grid;grid-template-rows:var(--nav-h) 1fr;height:100vh;overflow:hidden;}

/* NAV */
nav{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);gap:28px;position:relative;z-index:20;flex-shrink:0;}
.nav-brand{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--tomato);margin-right:auto;}
.nav-tab{background:none;border:none;color:var(--text-2);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:18px 0;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--tomato);}

/* PAGES */
.page{display:none;height:100%;overflow-y:auto;overflow-x:hidden;}
.page.active{display:block;}
#page-timer{display:none;overflow-y:auto;overflow-x:hidden;}
#page-timer.active{display:flex;align-items:flex-start;justify-content:center;position:relative;min-height:100%;}

/* BG */
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(30,40,50,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,40,50,.4) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;}
@keyframes doFlash{0%{opacity:0}20%{opacity:.12}100%{opacity:0}}
.flash.go{animation:doFlash 1.2s ease forwards;}

/* TIMER LAYOUT: 2-column with draggable divider */
.timer-wrap{position:relative;z-index:5;display:flex;flex-direction:row;width:100%;min-height:100%;max-width:1100px;padding:24px 0;align-items:stretch;}

/* Draggable divider */
.divider{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;transition:background .2s;}
.divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:60px;background:var(--border);border-radius:1px;transition:background .2s;}
.divider:hover::after,.divider.dragging::after{background:var(--tomato);}

.timer-col{display:flex;flex-direction:column;align-items:center;gap:22px;padding:12px 28px 24px;overflow-y:auto;flex-shrink:0;}

/* pills */
.mode-pills{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.pill{background:none;border:none;color:var(--text-3);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border-radius:5px;transition:all .25s;}
.pill:hover{color:var(--text-2);}
.pill.active{background:var(--border2);color:var(--text);}

/* ring */
.ring-container{position:relative;width:220px;height:220px;flex-shrink:0;}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.r-track{fill:none;stroke:var(--border2);stroke-width:1.5;}
.r-fill{fill:none;stroke-width:3;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .8s;}
.r-glow{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:0;opacity:.18;transition:stroke-dashoffset 1s linear,stroke .8s;filter:blur(4px);}
.ring-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.t-big{font-family:'Syne Mono',monospace;font-size:52px;line-height:1;letter-spacing:-.02em;transition:color .8s;}
.t-mode{font-size:9px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--text-2);}

/* controls */
.timer-controls{display:flex;align-items:center;gap:12px;}
.ctrl-btn{width:42px;height:42px;background:var(--surface);border:1px solid var(--border2);border-radius:50%;color:var(--text-2);font-size:15px;transition:all .2s;display:grid;place-items:center;}
.ctrl-btn:hover{color:var(--text);border-color:var(--text-3);}
.play-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:20px;transition:all .2s;display:grid;place-items:center;}
.play-btn.work{background:var(--tomato);color:white;box-shadow:0 0 24px var(--tomato-dim);}
.play-btn.rest{background:var(--teal);color:#080b0f;box-shadow:0 0 24px var(--teal-dim);}
.play-btn:hover{transform:scale(1.06);filter:brightness(1.1);}

/* today strip */
.today-strip{display:flex;gap:24px;border-top:1px solid var(--border);padding-top:18px;width:100%;justify-content:center;}
.t-stat{text-align:center;}
.t-val{font-family:'Syne Mono',monospace;font-size:22px;color:var(--text);display:block;line-height:1;}
.t-lbl{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);display:block;margin-top:4px;}
.tomato-dots{display:flex;gap:5px;justify-content:center;margin-top:4px;}
.td{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .4s;}
.td.lit{background:var(--tomato);box-shadow:0 0 5px var(--tomato);}

/* sliders */
.dur-row{display:flex;flex-direction:column;gap:9px;width:100%;}
.dur-item{display:flex;align-items:center;gap:8px;font-size:9px;color:var(--text-3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.dur-item .dur-lbl{width:26px;}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:var(--border2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--text-3);transition:background .2s;}
input[type=range]::-webkit-slider-thumb:hover{background:var(--text);}
.dur-val{min-width:20px;color:var(--text-2);text-align:right;font-family:'Syne Mono',monospace;}

/* TASKS COL */
.tasks-col{display:flex;flex-direction:column;gap:14px;padding:12px 28px 24px;flex:1;min-width:0;overflow-y:auto;}
.tasks-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tasks-title{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-2);}

/* active badge */
.active-task-badge{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0;font-size:12px;}
.atb-dot{width:7px;height:7px;border-radius:50%;background:var(--tomato);flex-shrink:0;box-shadow:0 0 5px var(--tomato);}
.atb-text{color:var(--text-2);}
.atb-name{color:var(--text);font-weight:700;}
.atb-none{color:var(--text-3);font-style:italic;font-size:11px;}

/* add task */
.add-task-row{display:flex;gap:8px;flex-shrink:0;}
.add-task-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.add-task-input::placeholder{color:var(--text-3);}
.add-task-input:focus{border-color:var(--border2);}
.add-task-btn{background:var(--tomato);border:none;color:white;border-radius:8px;padding:0 15px;font-size:20px;font-weight:300;transition:filter .2s;}
.add-task-btn:hover{filter:brightness(1.1);}

/* task list */
.task-list{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:6px;padding-right:2px;}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:9px;transition:all .2s;position:relative;}
.task-item:hover{border-color:var(--border2);}
.task-item.selected{border-color:var(--tomato);background:rgba(255,85,51,0.06);}
.task-item.done{opacity:.4;}
.task-item.done .task-name{text-decoration:line-through;color:var(--text-3);}

.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:grid;place-items:center;transition:all .2s;background:none;}
.task-check:hover{border-color:var(--teal);}
.task-check.checked{background:var(--teal);border-color:var(--teal);}
.task-check.checked::after{content:'✓';font-size:9px;color:#080b0f;font-weight:700;}

.task-body{flex:1;min-width:0;cursor:pointer;}
.task-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-meta{display:flex;gap:9px;margin-top:2px;}
.task-count{font-size:10px;color:var(--tomato);font-family:'Syne Mono',monospace;}
.task-time{font-size:10px;color:var(--text-3);font-family:'Syne Mono',monospace;}

.task-sel-btn{background:none;border:1px solid var(--border2);color:var(--text-3);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:5px;transition:all .2s;flex-shrink:0;}
.task-sel-btn:hover{color:var(--tomato);border-color:var(--tomato);}
.task-item.selected .task-sel-btn{color:var(--tomato);border-color:var(--tomato);background:rgba(255,85,51,0.08);}

.task-del{background:none;border:none;color:var(--text-3);font-size:13px;padding:2px 5px;border-radius:4px;opacity:0;transition:all .2s;flex-shrink:0;}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--tomato);background:rgba(255,85,51,.1);}

.empty-tasks{text-align:center;padding:36px 20px;color:var(--text-3);font-size:12px;line-height:1.9;}
.undo-btn{background:none;border:1px solid var(--border2);color:var(--text-3);font-size:11px;font-weight:600;padding:8px 16px;border-radius:8px;width:100%;letter-spacing:.05em;transition:all .2s;}
.undo-btn:hover{color:var(--tomato);border-color:var(--tomato);background:rgba(255,85,51,.06);}

/* DASHBOARD */
#page-dash{padding:28px 36px 60px;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
.dash-title{font-size:20px;font-weight:800;}
.dash-sub{font-size:10px;color:var(--text-3);letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-top:3px;}
.dash-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.period-tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.ptab{background:none;border:none;color:var(--text-3);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 13px;border-radius:5px;transition:all .2s;}
.ptab:hover{color:var(--text-2);}
.ptab.active{background:var(--border2);color:var(--text);}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-size:11px;font-weight:600;padding:7px 13px;letter-spacing:.05em;transition:all .2s;display:flex;align-items:center;gap:5px;}
.icon-btn:hover{color:var(--text);border-color:var(--border2);}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 16px 13px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.k-tomato::before{background:linear-gradient(90deg,var(--tomato),transparent);}
.kpi-card.k-teal::before{background:linear-gradient(90deg,var(--teal),transparent);}
.kpi-card.k-amber::before{background:linear-gradient(90deg,var(--amber),transparent);}
.kpi-card.k-blue::before{background:linear-gradient(90deg,var(--blue),transparent);}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;}
.kpi-value{font-family:'Syne Mono',monospace;font-size:32px;line-height:1;}
.kpi-value.k-tomato{color:var(--tomato);}
.kpi-value.k-teal{color:var(--teal);}
.kpi-value.k-amber{color:var(--amber);}
.kpi-value.k-blue{color:var(--blue);}
.kpi-sub{font-size:10px;color:var(--text-3);margin-top:4px;}

.dash-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:11px;margin-bottom:11px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.chart-title{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-2);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}

.bar-chart{display:flex;align-items:flex-end;gap:4px;height:115px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-end;gap:2px;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s cubic-bezier(.34,1.56,.64,1);}
.bar-lbl{font-size:8px;color:var(--text-3);font-weight:600;}
.bar-val{font-size:8px;color:var(--text-3);font-family:'Syne Mono',monospace;}

.task-breakdown{display:flex;flex-direction:column;gap:9px;}
.tb-row{display:flex;flex-direction:column;gap:4px;}
.tb-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.tb-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.tb-val{font-family:'Syne Mono',monospace;font-size:10px;color:var(--text-2);flex-shrink:0;}
.tb-bar-wrap{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.tb-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.tb-empty{font-size:11px;color:var(--text-3);text-align:center;padding:18px 0;}

.cal-nav{display:flex;align-items:center;gap:9px;}
.cal-nav-btn{background:none;border:1px solid var(--border2);color:var(--text-2);width:24px;height:24px;border-radius:5px;font-size:13px;transition:all .2s;display:grid;place-items:center;}
.cal-nav-btn:hover{color:var(--text);}
.cal-month-label{font-size:11px;font-weight:700;min-width:70px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:8px;font-weight:700;color:var(--text-3);padding-bottom:4px;}
.cal-cell{aspect-ratio:1;border-radius:5px;background:var(--border);display:flex;align-items:flex-end;justify-content:flex-end;padding:2px;position:relative;transition:background .3s;border:1px solid transparent;}
.cal-cell.today{border-color:var(--text-3);}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell:hover:not(.empty)::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1e2832;color:var(--text);font-size:9px;padding:3px 7px;border-radius:5px;white-space:nowrap;z-index:99;pointer-events:none;border:1px solid var(--border2);}
.cal-date{font-size:7px;font-weight:700;color:var(--text-3);line-height:1;}

.record-list{display:flex;flex-direction:column;}
.record-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.record-row:last-child{border-bottom:none;}
.rec-lbl{font-size:10px;color:var(--text-2);font-weight:600;}
.rec-val{font-family:'Syne Mono',monospace;font-size:16px;color:var(--tomato);}
.rec-date{font-size:9px;color:var(--text-3);margin-top:1px;}

.legend{display:flex;gap:11px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-3);font-weight:600;}
.leg-dot{width:7px;height:7px;border-radius:2px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;width:min(460px,92vw);display:flex;flex-direction:column;gap:14px;}
.modal-title{font-size:15px;font-weight:800;}
.modal-sub{font-size:12px;color:var(--text-2);line-height:1.6;}
.modal-textarea{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:11px;color:var(--text);font-family:'Syne Mono',monospace;font-size:11px;resize:vertical;min-height:120px;outline:none;width:100%;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{background:var(--border2);border:none;color:var(--text);font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;transition:all .2s;}
.modal-btn.primary{background:var(--tomato);color:white;}
.modal-btn:hover{filter:brightness(1.1);}

/* INSTALL */
#installBanner{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;display:none;align-items:center;gap:11px;box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:100;}
.install-text{font-size:12px;color:var(--text-2);}
.install-text strong{color:var(--text);}
.install-btn{background:var(--tomato);color:white;border:none;font-size:11px;font-weight:700;padding:6px 13px;border-radius:6px;transition:filter .2s;}
.install-btn:hover{filter:brightness(1.1);}
.install-close{background:none;border:none;color:var(--text-3);font-size:16px;padding:2px 4px;}

/* PiP button */
.pip-btn{background:none;border:1px solid var(--border2);color:var(--text-3);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:8px;width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.pip-btn:hover{color:var(--text);border-color:var(--text-3);}
.pip-btn.active{color:var(--tomato);border-color:var(--tomato);background:rgba(255,85,51,.07);}
</style>
</head>
<body>
<div class="app">
  <nav>
    <span class="nav-brand">🍅 番茄钟</span>
    <button class="nav-tab active" onclick="switchTab('timer')" id="ntab-timer">计时器</button>
    <button class="nav-tab" onclick="switchTab('dash')"  id="ntab-dash">数据看板</button>
  </nav>

  <!-- TIMER PAGE -->
  <div class="page active" id="page-timer">
    <div class="bg-grid"></div>
    <div class="flash" id="flash"></div>
    <div class="timer-wrap">

      <!-- Left: timer -->
      <div class="timer-col" id="timerCol" style="width:300px">
        <div class="mode-pills">
          <button class="pill active" onclick="setMode('work')"  id="p-work">专注</button>
          <button class="pill"        onclick="setMode('short')" id="p-short">短休息</button>
          <button class="pill"        onclick="setMode('long')"  id="p-long">长休息</button>
        </div>
        <div class="ring-container">
          <svg class="ring-svg" viewBox="0 0 220 220">
            <circle class="r-track" cx="110" cy="110" r="100"/>
            <circle class="r-glow"  id="rGlow" cx="110" cy="110" r="100"/>
            <circle class="r-fill"  id="rFill" cx="110" cy="110" r="100"/>
          </svg>
          <div class="ring-face">
            <div class="t-big"  id="tBig">25:00</div>
            <div class="t-mode" id="tMode">专注时间</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="ctrl-btn" onclick="resetTimer()" title="重置">↺</button>
          <button class="play-btn work" id="playBtn" onclick="toggleTimer()">▶</button>
          <button class="ctrl-btn" onclick="skipSession()" title="跳过">⇥</button>
        </div>
        <div class="today-strip">
          <div class="t-stat">
            <span class="t-val" id="tTomatoes">0</span>
            <span class="t-lbl">今日番茄</span>
            <div class="tomato-dots">
              <div class="td"></div><div class="td"></div>
              <div class="td"></div><div class="td"></div>
            </div>
          </div>
          <div class="t-stat">
            <span class="t-val" id="tFocus">0</span>
            <span class="t-lbl">专注分钟</span>
          </div>
          <div class="t-stat">
            <span class="t-val" id="tStreak">0</span>
            <span class="t-lbl">连续天数</span>
          </div>
        </div>
        <div class="dur-row">
          <div class="dur-item"><span class="dur-lbl">专注</span><input type="range" id="slWork"  min="1" max="60" value="25" oninput="updateDur('work',this.value)"><span class="dur-val" id="dvWork">25</span>m</div>
          <div class="dur-item"><span class="dur-lbl">短休</span><input type="range" id="slShort" min="1" max="30" value="5"  oninput="updateDur('short',this.value)"><span class="dur-val" id="dvShort">5</span>m</div>
          <div class="dur-item"><span class="dur-lbl">长休</span><input type="range" id="slLong"  min="5" max="60" value="15" oninput="updateDur('long',this.value)"><span class="dur-val" id="dvLong">15</span>m</div>
        </div>
        <!-- Undo last tomato -->
        <button class="undo-btn" id="undoBtn" onclick="undoLastTomato()" style="display:none">
          ↩ 撤销最后一个番茄
        </button>
        <!-- Picture-in-Picture -->
        <button class="pip-btn" id="pipBtn" onclick="togglePiP()">
          <span>⧉</span> 小窗模式
        </button>
      </div>

      <!-- Draggable divider -->
      <div class="divider" id="divider"></div>

      <!-- Right: tasks -->
      <div class="tasks-col" id="tasksCol">
        <div class="tasks-header">
          <span class="tasks-title">📋 今日任务</span>
          <button class="icon-btn" onclick="clearDoneTasks()" style="font-size:10px">清理已完成</button>
        </div>
        <div class="active-task-badge" id="activeBadge">
          <div class="atb-dot" id="atbDot" style="opacity:0"></div>
          <div id="atbText"><span class="atb-none">未选择任务 — 点击下方任务开始专注</span></div>
        </div>
        <div class="add-task-row">
          <input class="add-task-input" id="taskInput" placeholder="添加任务，按 Enter 确认…" maxlength="40" onkeydown="if(event.key==='Enter')addTask()">
          <button class="add-task-btn" onclick="addTask()">+</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div class="page" id="page-dash">
    <div class="dash-header">
      <div>
        <div class="dash-title">数据看板</div>
        <div class="dash-sub" id="dashDateLabel"></div>
      </div>
      <div class="dash-actions">
        <button class="icon-btn" onclick="openExport()">📤 导出</button>
        <button class="icon-btn" onclick="openImport()">📥 导入</button>
        <div class="period-tabs">
          <button class="ptab active" onclick="setPeriod('day')"   id="ptab-day">今日</button>
          <button class="ptab"        onclick="setPeriod('week')"  id="ptab-week">本周</button>
          <button class="ptab"        onclick="setPeriod('month')" id="ptab-month">本月</button>
        </div>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi-card k-tomato"><div class="kpi-label">专注番茄</div><div class="kpi-value k-tomato" id="kpiTomato">0</div><div class="kpi-sub" id="kpiTomatoSub"></div></div>
      <div class="kpi-card k-teal"><div class="kpi-label">专注时长</div><div class="kpi-value k-teal" id="kpiFocus">0<span style="font-size:15px">分</span></div><div class="kpi-sub" id="kpiFocusSub"></div></div>
      <div class="kpi-card k-amber"><div class="kpi-label">休息时长</div><div class="kpi-value k-amber" id="kpiRest">0<span style="font-size:15px">分</span></div><div class="kpi-sub" id="kpiRestSub"></div></div>
      <div class="kpi-card k-blue"><div class="kpi-label">连续天数</div><div class="kpi-value k-blue" id="kpiStreak">0<span style="font-size:15px">天</span></div><div class="kpi-sub" id="kpiStreakSub"></div></div>
    </div>
    <div class="dash-grid-3">
      <div class="chart-card">
        <div class="chart-title">
          <span id="barTitle">过去 7 天</span>
          <div class="legend">
            <div class="leg-item"><div class="leg-dot" style="background:var(--tomato)"></div>专注</div>
            <div class="leg-item"><div class="leg-dot" style="background:#1a4038"></div>休息</div>
          </div>
        </div>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">任务分布</div>
        <div class="task-breakdown" id="taskBreakdown"></div>
      </div>
    </div>
    <div class="dash-grid">
      <div class="chart-card">
        <div class="chart-title">
          <span>月历热力图</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">‹</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-nav-btn" onclick="calNext()">›</button>
          </div>
        </div>
        <div id="calGrid"></div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:11px;font-size:9px;color:var(--text-3);font-weight:600">少<div style="display:flex;gap:3px"><div style="width:10px;height:10px;border-radius:2px;background:#1e2832"></div><div style="width:10px;height:10px;border-radius:2px;background:#7a1a0d"></div><div style="width:10px;height:10px;border-radius:2px;background:#c42a14"></div><div style="width:10px;height:10px;border-radius:2px;background:#e83d22"></div><div style="width:10px;height:10px;border-radius:2px;background:#ff5533"></div></div>多</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">个人最佳</div>
        <div class="record-list">
          <div class="record-row"><div><div class="rec-lbl">单日最多番茄</div><div class="rec-date" id="bestDayDate">—</div></div><div class="rec-val" id="bestDay">0</div></div>
          <div class="record-row"><div><div class="rec-lbl">单周最多番茄</div><div class="rec-date" id="bestWeekDate">—</div></div><div class="rec-val" id="bestWeek">0</div></div>
          <div class="record-row"><div><div class="rec-lbl">最长连续天数</div></div><div class="rec-val" id="bestStreak">0</div></div>
          <div class="record-row"><div><div class="rec-lbl">累计专注时间</div></div><div class="rec-val" id="totalFocus">0h</div></div>
        </div>

</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">📤 导出数据</div>
    <div class="modal-sub">复制下方内容，保存到记事本或发给自己。换电脑后用「导入」恢复。</div>
    <textarea class="modal-textarea" id="exportText" readonly onclick="this.select()"></textarea>
    <div class="modal-actions">
      <button class="modal-btn" onclick="copyExport()">复制到剪贴板</button>
      <button class="modal-btn primary" onclick="closeModal('exportModal')">关闭</button>

<div class="modal-overlay" id="importModal">

    <div class="modal-title">📥 导入数据</div>
    <div class="modal-sub">粘贴之前导出的数据，将与现有数据合并（不会丢失现有记录）。</div>
    <textarea class="modal-textarea" id="importText" placeholder="粘贴导出的 JSON 数据…"></textarea>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('importModal')">取消</button>
      <button class="modal-btn primary" onclick="doImport()">导入</button>
    </div>

<!-- Install Banner -->
<div id="installBanner">
  <span class="install-text">将<strong>番茄钟</strong>安装到桌面</span>
  <button class="install-btn" onclick="installApp()">📌 安装</button>
  <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

<script>
// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex';});
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').style.display='none';});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none';});}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// DATA
const DATA_KEY='pomo_data_v4', TASKS_KEY='pomo_tasks_v1';
function loadData(){try{return JSON.parse(localStorage.getItem(DATA_KEY))||{};}catch{return {};}}
function savData(d){localStorage.setItem(DATA_KEY,JSON.stringify(d));}
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASKS_KEY))||[];}catch{return [];}}
function savTasks(t){localStorage.setItem(TASKS_KEY,JSON.stringify(t));}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayKey(){return dateKey(new Date());}

function recordSession(type,minutes,taskId,taskName){
  const data=loadData(),k=todayKey();
  if(!data[k])data[k]={tomatoes:0,workMins:0,shortMins:0,longMins:0,tasks:{}};
  const day=data[k];
  if(type==='work'){
    day.tomatoes++;day.workMins+=minutes;
    if(taskId){
      if(!day.tasks[taskId])day.tasks[taskId]={name:taskName,tomatoes:0,mins:0};
      day.tasks[taskId].tomatoes++;day.tasks[taskId].mins+=minutes;day.tasks[taskId].name=taskName;
      const tasks=loadTasks(),t=tasks.find(t=>t.id===taskId);
      if(t){t.totalTomatoes=(t.totalTomatoes||0)+1;t.totalMins=(t.totalMins||0)+minutes;savTasks(tasks);}
    }
  }else if(type==='short'){day.shortMins+=minutes;}
  else if(type==='long'){day.longMins+=minutes;}
  savData(data);
}

// TASKS
let selectedTaskId=null;
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addTask(){
  const inp=document.getElementById('taskInput'),name=inp.value.trim();
  if(!name)return;
  const tasks=loadTasks();
  tasks.push({id:Date.now().toString(),name,done:false,totalTomatoes:0,totalMins:0,createdAt:todayKey()});
  savTasks(tasks);inp.value='';renderTasks();
}
function selectTask(id){
  selectedTaskId=selectedTaskId===id?null:id;
  renderTasks();updateActiveBadge();
}
function toggleTaskDone(id){
  const tasks=loadTasks(),t=tasks.find(t=>t.id===id);
  if(t){t.done=!t.done;savTasks(tasks);}
  if(selectedTaskId===id&&t?.done){selectedTaskId=null;updateActiveBadge();}
  renderTasks();
}
function deleteTask(id){
  savTasks(loadTasks().filter(t=>t.id!==id));
  if(selectedTaskId===id){selectedTaskId=null;updateActiveBadge();}
  renderTasks();
}
function clearDoneTasks(){savTasks(loadTasks().filter(t=>!t.done));renderTasks();}

function renderTasks(){
  const tasks=loadTasks(),el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML='<div class="empty-tasks">还没有任务<br>在上方添加今天要专注的事项 ↑</div>';return;}
  const sorted=[...tasks.filter(t=>!t.done),...tasks.filter(t=>t.done)];
  el.innerHTML=sorted.map(t=>`
    <div class="task-item${t.id===selectedTaskId?' selected':''}${t.done?' done':''}">
      <button class="task-check${t.done?' checked':''}" onclick="toggleTaskDone('${t.id}')"></button>
      <div class="task-body" onclick="selectTask('${t.id}')">
        <div class="task-name">${escHtml(t.name)}</div>
        <div class="task-meta">
          ${t.totalTomatoes?`<span class="task-count">🍅×${t.totalTomatoes}</span>`:''}
          ${t.totalMins?`<span class="task-time">${t.totalMins}分钟</span>`:''}
        </div>
      </div>
      ${!t.done?`<button class="task-sel-btn" onclick="selectTask('${t.id}')">${t.id===selectedTaskId?'✓ 专注中':'选择'}</button>`:''}
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>`).join('');
}

function updateActiveBadge(){
  const dot=document.getElementById('atbDot'),text=document.getElementById('atbText');
  if(!selectedTaskId){dot.style.opacity='0';text.innerHTML='<span class="atb-none">未选择任务 — 点击下方任务开始专注</span>';return;}
  const t=loadTasks().find(t=>t.id===selectedTaskId);
  if(!t){selectedTaskId=null;updateActiveBadge();return;}
  dot.style.opacity='1';
  text.innerHTML=`<span class="atb-text">当前专注：</span><span class="atb-name">${escHtml(t.name)}</span>`;
}

// TIMER
const C=2*Math.PI*100; // r=100
const rFill=document.getElementById('rFill'),rGlow=document.getElementById('rGlow');
rFill.style.strokeDasharray=C;rGlow.style.strokeDasharray=C;
const cfg={work:25*60,short:5*60,long:15*60};
let mode='work',timeLeft=cfg.work,totalTime=cfg.work,running=false,timer=null,cycleCount=0;
const modeLabels={work:'专注时间',short:'短休息',long:'长休息'};
const modeColors={work:'#ff5533',short:'#00d4aa',long:'#00d4aa'};

function fmtTime(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function applyColors(){const c=modeColors[mode];rFill.style.stroke=c;rGlow.style.stroke=c;document.getElementById('playBtn').className=`play-btn ${mode==='work'?'work':'rest'}`;document.getElementById('tBig').style.color=mode==='work'?'#e8eef5':'#00d4aa';}
function updateRing(){const off=C*(1-timeLeft/totalTime);rFill.style.strokeDashoffset=off;rGlow.style.strokeDashoffset=off;}
function render(){document.getElementById('tBig').textContent=fmtTime(timeLeft);document.getElementById('tMode').textContent=modeLabels[mode];document.title=fmtTime(timeLeft)+' · 番茄钟';updateRing();applyColors();renderTimerStats();}
function renderTimerStats(){
  const data=loadData(),day=data[todayKey()]||{tomatoes:0,workMins:0};
  document.getElementById('tTomatoes').textContent=day.tomatoes;
  document.getElementById('tFocus').textContent=day.workMins||0;
  document.getElementById('tStreak').textContent=calcStreak(data);
  const dots=document.querySelectorAll('.td'),pos=cycleCount%4;
  dots.forEach((d,i)=>d.classList.toggle('lit',i<pos));
}
function setMode(m){clearInterval(timer);running=false;mode=m;timeLeft=cfg[m];totalTime=cfg[m];document.getElementById('playBtn').textContent='▶';['work','short','long'].forEach(x=>document.getElementById('p-'+x).classList.toggle('active',x===m));render();}
function toggleTimer(){if(running){clearInterval(timer);running=false;document.getElementById('playBtn').textContent='▶';}else{running=true;document.getElementById('playBtn').textContent='⏸';timer=setInterval(tick,1000);}}
function tick(){if(timeLeft<=0){onDone();return;}timeLeft--;render();}
function onDone(){
  clearInterval(timer);running=false;document.getElementById('playBtn').textContent='▶';
  const fl=document.getElementById('flash');fl.style.background=modeColors[mode];fl.classList.remove('go');void fl.offsetWidth;fl.classList.add('go');
  const mins=Math.round(cfg[mode]/60);
  const selTask=loadTasks().find(t=>t.id===selectedTaskId);
  recordSession(mode,mins,selectedTaskId,selTask?.name);
  if(mode==='work'){
    cycleCount++;
    const taskName = selTask ? `「${selTask.name}」` : '';
    sendNotification('🍅 你已完成了一个番茄钟！', taskName ? `${taskName} +1 🍅 好好休息一下` : '专注结束，好好休息一下', 'pomo-done');
    renderTasks();
    // show undo button for 5 minutes
    const undoBtn=document.getElementById('undoBtn');
    undoBtn.style.display='block';
    setTimeout(()=>undoBtn.style.display='none', 5*60*1000);
    setTimeout(()=>setMode(cycleCount%4===0?'long':'short'),1200);
  }else{
    sendNotification('✅ 休息结束！', '准备好了吗？开始下一个番茄钟', 'pomo-rest');
    setTimeout(()=>setMode('work'),1200);
  }
  renderTimerStats();
}
function resetTimer(){clearInterval(timer);running=false;timeLeft=cfg[mode];totalTime=cfg[mode];document.getElementById('playBtn').textContent='▶';render();}
function skipSession(){clearInterval(timer);running=false;onDone();}
function updateDur(type,val){cfg[type]=val*60;document.getElementById('dv'+type.charAt(0).toUpperCase()+type.slice(1)).textContent=val;if(mode===type)resetTimer();}

// DASHBOARD
let period='day',calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function setPeriod(p){period=p;['day','week','month'].forEach(x=>document.getElementById('ptab-'+x).classList.toggle('active',x===p));renderDash();}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar(loadData());}
function calNext(){const n=new Date();if(calYear===n.getFullYear()&&calMonth>=n.getMonth())return;calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar(loadData());}

function renderDash(){
  const data=loadData(),today=new Date();
  document.getElementById('dashDateLabel').textContent=today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  let keys=[];
  if(period==='day'){keys=[todayKey()];}
  else if(period==='week'){const dow=(today.getDay()+6)%7;for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-dow+i);keys.push(dateKey(d));}}
  else{const y=today.getFullYear(),m=today.getMonth(),days=new Date(y,m+1,0).getDate();for(let i=1;i<=days;i++)keys.push(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`);}
  const tomatoes=keys.reduce((s,k)=>s+(data[k]?.tomatoes||0),0);
  const workMins=keys.reduce((s,k)=>s+(data[k]?.workMins||0),0);
  const shortMins=keys.reduce((s,k)=>s+(data[k]?.shortMins||0),0);
  const longMins=keys.reduce((s,k)=>s+(data[k]?.longMins||0),0);
  const restMins=shortMins+longMins;
  const activeDays=keys.filter(k=>(data[k]?.tomatoes||0)>0).length;
  document.getElementById('kpiTomato').innerHTML=`${tomatoes}`;
  document.getElementById('kpiTomatoSub').textContent=period==='day'?'今日完成':`${activeDays} 天有记录`;
  document.getElementById('kpiFocus').innerHTML=`${workMins}<span style="font-size:15px">分</span>`;
  document.getElementById('kpiFocusSub').textContent=workMins>=60?`≈ ${(workMins/60).toFixed(1)} 小时`:'专注合计';
  document.getElementById('kpiRest').innerHTML=`${restMins}<span style="font-size:15px">分</span>`;
  document.getElementById('kpiRestSub').textContent=restMins>=60?`≈ ${(restMins/60).toFixed(1)} 小时`:'休息合计';
  document.getElementById('kpiStreak').innerHTML=`${calcStreak(data)}<span style="font-size:15px">天</span>`;
  document.getElementById('kpiStreakSub').textContent='持续打卡中';
  renderTaskBreakdown(data,keys);renderBar(data,period);renderCalendar(data);renderRecords(data);
}

function renderTaskBreakdown(data,keys){
  const el=document.getElementById('taskBreakdown');
  const taskMap={};
  keys.forEach(k=>{Object.entries(data[k]?.tasks||{}).forEach(([tid,tv])=>{if(!taskMap[tid])taskMap[tid]={name:tv.name,tomatoes:0,mins:0};taskMap[tid].tomatoes+=tv.tomatoes;taskMap[tid].mins+=tv.mins;});});
  const entries=Object.values(taskMap).sort((a,b)=>b.tomatoes-a.tomatoes);
  if(!entries.length){el.innerHTML='<div class="tb-empty">暂无任务数据</div>';return;}
  const maxT=Math.max(...entries.map(e=>e.tomatoes),1);
  const colors=['#ff5533','#ff8844','#ffaa33','#44cc77','#4d9fff','#9b7cff'];
  el.innerHTML=entries.slice(0,6).map((e,i)=>`
    <div class="tb-row">
      <div class="tb-head">
        <span class="tb-name" style="color:${colors[i%colors.length]}">${escHtml(e.name)}</span>
        <span class="tb-val">🍅×${e.tomatoes}·${e.mins}分</span>
      </div>
      <div class="tb-bar-wrap"><div class="tb-bar-fill" style="width:${e.tomatoes/maxT*100}%;background:${colors[i%colors.length]}"></div></div>
    </div>`).join('');
}

function renderBar(data,period){
  const el=document.getElementById('barChart'),today=new Date();let days=[];
  if(period!=='month'){for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);days.push({key:dateKey(d),label:i===0?'今':['日','一','二','三','四','五','六'][d.getDay()]});}document.getElementById('barTitle').textContent='过去 7 天';}
  else{const dow=(today.getDay()+6)%7;for(let w=7;w>=0;w--){const wk=[];for(let d2=0;d2<7;d2++){const dd=new Date(today);dd.setDate(today.getDate()-dow-w*7+d2);wk.push(dateKey(dd));}const st=new Date(today);st.setDate(today.getDate()-dow-w*7);days.push({key:wk.join(','),label:w===0?'本周':`${st.getMonth()+1}/${st.getDate()}`});}document.getElementById('barTitle').textContent='过去 8 周';}
  const wV=days.map(d=>d.key.split(',').reduce((s,k)=>s+(data[k]?.workMins||0),0));
  const rV=days.map(d=>d.key.split(',').reduce((s,k)=>s+((data[k]?.shortMins||0)+(data[k]?.longMins||0)),0));
  const maxV=Math.max(...wV.map((v,i)=>v+rV[i]),1);
  const ts=todayKey();el.innerHTML='';
  days.forEach((d,i)=>{const wP=wV[i]/maxV*100,rP=rV[i]/maxV*100,isT=d.key===ts||d.key.includes(ts);el.innerHTML+=`<div class="bar-group" title="${d.key.split(',')[0]}: 专注${wV[i]}分 休息${rV[i]}分"><div class="bar-val">${wV[i]||''}</div><div class="bar-wrap"><div class="bar" style="height:${Math.max(wP,0)}%;background:${isT?'var(--tomato)':'#7a1a0d'}"></div><div class="bar" style="height:${Math.max(rP,0)}%;background:#1a4038"></div></div><div class="bar-lbl">${d.label}</div></div>`;});
}

function renderCalendar(data){
  const now=new Date(),isCur=calYear===now.getFullYear()&&calMonth===now.getMonth();
  document.getElementById('calMonthLabel').textContent=`${calYear}年${calMonth+1}月`;
  const dim=new Date(calYear,calMonth+1,0).getDate(),firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
  let maxV=1;for(let d=1;d<=dim;d++){const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;maxV=Math.max(maxV,data[k]?.tomatoes||0);}
  const ic=['#1e2832','#7a1a0d','#c42a14','#e83d22','#ff5533'];
  let html='<div class="cal-grid">';
  ['一','二','三','四','五','六','日'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDow;i++)html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const v=data[k]?.tomatoes||0,wm=data[k]?.workMins||0;
    const intensity=v===0?0:Math.min(Math.ceil(v/maxV*4),4);
    const isToday=isCur&&d===now.getDate(),isFuture=new Date(calYear,calMonth,d)>now;
    const tip=v>0?`${k}: ${v}🍅 ${wm}分钟`:k;
    html+=`<div class="cal-cell${isToday?' today':''}" style="background:${isFuture?'transparent':ic[intensity]}${isFuture?';opacity:.2':''}" data-tip="${tip}"><div class="cal-date" style="color:${isToday?'var(--text)':'var(--text-3)'}">${d}</div></div>`;
  }
  html+='</div>';document.getElementById('calGrid').innerHTML=html;
}

function renderRecords(data){
  const allKeys=Object.keys(data).sort();if(!allKeys.length)return;
  let bdKey='',bdVal=0;allKeys.forEach(k=>{if((data[k]?.tomatoes||0)>bdVal){bdVal=data[k].tomatoes;bdKey=k;}});
  document.getElementById('bestDay').textContent=bdVal;document.getElementById('bestDayDate').textContent=bdKey||'—';
  const wm={};allKeys.forEach(k=>{const wk=isoWeek(new Date(k));if(!wm[wk])wm[wk]={total:0,start:k};wm[wk].total+=(data[k]?.tomatoes||0);});
  let bwV=0,bwS='';Object.values(wm).forEach(v=>{if(v.total>bwV){bwV=v.total;bwS=v.start;}});
  document.getElementById('bestWeek').textContent=bwV;document.getElementById('bestWeekDate').textContent=bwS?`w/o ${bwS}`:'—';
  document.getElementById('bestStreak').textContent=calcBestStreak(data);
  const tm=allKeys.reduce((s,k)=>s+(data[k]?.workMins||0),0);
  document.getElementById('totalFocus').textContent=tm>=60?`${(tm/60).toFixed(0)}h`:`${tm}m`;
}

// IMPORT / EXPORT
function openExport(){
  document.getElementById('exportText').value=JSON.stringify({data:loadData(),tasks:loadTasks(),exportedAt:new Date().toISOString()},null,2);
  document.getElementById('exportModal').classList.add('open');

function copyExport(){const el=document.getElementById('exportText');el.select();document.execCommand('copy');alert('已复制到剪贴板！');}
function openImport(){document.getElementById('importText').value='';document.getElementById('importModal').classList.add('open');}
function doImport(){
  try{
    const payload=JSON.parse(document.getElementById('importText').value.trim());
    if(!payload.data)throw new Error();
    const existing=loadData();
    Object.entries(payload.data).forEach(([k,v])=>{if(!existing[k]||(v.tomatoes||0)>(existing[k].tomatoes||0))existing[k]=v;});
    savData(existing);
    if(payload.tasks){const et=loadTasks(),ids=new Set(et.map(t=>t.id));payload.tasks.forEach(t=>{if(!ids.has(t.id))et.push(t);});savTasks(et);}
    closeModal('importModal');renderTasks();alert('✅ 导入成功！');
  }catch{alert('❌ 导入失败，请检查数据格式。');}
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));

// HELPERS
function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const w1=new Date(t.getFullYear(),0,4);return `${t.getFullYear()}-W${String(1+Math.round(((t-w1)/86400000-3+(w1.getDay()+6)%7)/7)).padStart(2,'0')}`;}
function calcStreak(data){let s=0;const d=new Date();while(true){const k=dateKey(d);if((data[k]?.tomatoes||0)>0){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function calcBestStreak(data){const keys=Object.keys(data).filter(k=>(data[k]?.tomatoes||0)>0).sort();if(!keys.length)return 0;let best=1,cur=1;for(let i=1;i<keys.length;i++){const diff=(new Date(keys[i])-new Date(keys[i-1]))/86400000;if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;}return best;}

function switchTab(tab){
  ['timer','dash'].forEach(t=>{document.getElementById('page-'+t).classList.toggle('active',t===tab);document.getElementById('ntab-'+t).classList.toggle('active',t===tab);});
  if(tab==='dash')renderDash();
}

// DRAGGABLE DIVIDER
(function(){
  const divider=document.getElementById('divider');
  const timerCol=document.getElementById('timerCol');
  if(!divider||!timerCol)return;
  let dragging=false,startX=0,startW=0;
  divider.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startW=timerCol.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const wrap=document.getElementById('timerCol').parentElement;
    const newW=Math.max(220,Math.min(startW+(e.clientX-startX),wrap.offsetWidth-240));
    timerCol.style.width=newW+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;divider.classList.remove('dragging');
    document.body.style.cursor='';document.body.style.userSelect='';
  });
})();

// UNDO LAST TOMATO
function undoLastTomato(){
  if(!confirm('撤销今天最后一个番茄？'))return;
  const data=loadData(),k=todayKey(),day=data[k];
  if(!day||!day.tomatoes)return;
  day.tomatoes=Math.max(0,day.tomatoes-1);
  day.workMins=Math.max(0,day.workMins-Math.round(cfg.work/60));
  // also subtract from last task
  if(day.tasks){
    const taskEntries=Object.entries(day.tasks).filter(([,v])=>v.tomatoes>0);
    if(taskEntries.length){
      // find task with most recent tomato (just pick the one with most)
      const [lastTid,lastTv]=taskEntries.sort((a,b)=>b[1].tomatoes-a[1].tomatoes)[0];
      lastTv.tomatoes=Math.max(0,lastTv.tomatoes-1);
      lastTv.mins=Math.max(0,lastTv.mins-Math.round(cfg.work/60));
      // also update task total
      const tasks=loadTasks(),t=tasks.find(t=>t.id===lastTid);
      if(t){t.totalTomatoes=Math.max(0,(t.totalTomatoes||1)-1);t.totalMins=Math.max(0,(t.totalMins||0)-Math.round(cfg.work/60));savTasks(tasks);}
    }
  }
  if(day.tomatoes===0)delete data[k];else data[k]=day;
  savData(data);
  cycleCount=Math.max(0,cycleCount-1);
  renderTimerStats();renderTasks();
  document.getElementById('undoBtn').style.display='none';
}

// PICTURE-IN-PICTURE (Document PiP API)
// ══════════════════════════════════════════
let pipWindow = null;
let pipInterval = null;

async function togglePiP() {
  // Close if already open
  if (pipWindow && !pipWindow.closed) {
    pipWindow.close();
    return;
  }

  if (!('documentPictureInPicture' in window)) {
    alert('你的 Chrome 版本不支持小窗功能，请更新到 Chrome 116 或更高版本。');
    return;
  }

  try {
    pipWindow = await window.documentPictureInPicture.requestWindow({
      width: 280, height: 200,
      disallowReturnToOpener: false,
    });

    // Inject styles into pip window
    const style = pipWindow.document.createElement('style');
    style.textContent = `
      *{margin:0;padding:0;box-sizing:border-box;}
      body{background:#080b0f;font-family:'Syne Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px;user-select:none;}
      #pip-mode{font-size:10px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#445566;}
      #pip-time{font-size:56px;font-weight:700;line-height:1;letter-spacing:-.02em;}
      #pip-bar-bg{width:220px;height:3px;background:#1e2832;border-radius:2px;}
      #pip-bar-fill{height:3px;border-radius:2px;transition:width .9s linear;}
      .pip-btns{display:flex;gap:8px;}
      .pip-btn{border:none;border-radius:8px;font-size:12px;font-weight:700;padding:8px 22px;cursor:pointer;font-family:monospace;}
      #pip-pause{color:white;}
      #pip-stop{background:#1e2832;color:#8899aa;}
    `;
    pipWindow.document.head.appendChild(style);

    // Inject Google Fonts
    const font = pipWindow.document.createElement('link');
    font.rel = 'stylesheet';
    font.href = 'https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap';
    pipWindow.document.head.appendChild(font);

    // Build UI
    pipWindow.document.body.innerHTML = `
      <div id="pip-mode"></div>
      <div id="pip-time"></div>
      <div id="pip-bar-bg"><div id="pip-bar-fill"></div></div>
      <div class="pip-btns">
        <button class="pip-btn" id="pip-pause"></button>
        <button class="pip-btn" id="pip-stop">■ 终止</button>
      </div>
    `;
    pipWindow.document.head.appendChild(style);

    // Wire up buttons
    pipWindow.document.getElementById('pip-pause').onclick = () => toggleTimer();
    pipWindow.document.getElementById('pip-stop').onclick  = () => { resetTimer(); pipWindow.close(); };

    // Update pip content every second
    function updatePip() {
      if (!pipWindow || pipWindow.closed) { clearInterval(pipInterval); return; }
      const isWork = mode === 'work';
      const accent = isWork ? '#ff5533' : '#00d4aa';
      const pw = pipWindow.document;
      pw.getElementById('pip-mode').textContent = modeLabels[mode];
      pw.getElementById('pip-time').textContent = fmtTime(timeLeft);
      pw.getElementById('pip-time').style.color = isWork ? '#e8eef5' : '#00d4aa';
      const pct = (1 - timeLeft / totalTime) * 100;
      pw.getElementById('pip-bar-fill').style.width = pct + '%';
      pw.getElementById('pip-bar-fill').style.background = accent;
      const pauseBtn = pw.getElementById('pip-pause');
      pauseBtn.textContent = running ? '⏸ 暂停' : '▶ 继续';
      pauseBtn.style.background = accent;
      pauseBtn.style.color = isWork ? '#fff' : '#080b0f';
    }
    updatePip();
    pipInterval = setInterval(updatePip, 500);

    // Update pip button in main window
    document.getElementById('pipBtn').classList.add('active');
    document.getElementById('pipBtn').innerHTML = '<span>⊠</span> 关闭小窗';

    pipWindow.addEventListener('pagehide', () => {
      clearInterval(pipInterval);
      pipWindow = null;
      document.getElementById('pipBtn').classList.remove('active');
      document.getElementById('pipBtn').innerHTML = '<span>⧉</span> 小窗模式';
    });

  } catch(e) {
    console.warn('PiP error:', e);
    alert('无法启动小窗：' + e.message);
  }
}

function sendNotification(title, body, tag) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body,
    tag,
    icon: 'icon-192.png',
    badge: 'icon-192.png',
    requireInteraction: false,
    silent: false
  });
  setTimeout(() => n.close(), 8000);
}
